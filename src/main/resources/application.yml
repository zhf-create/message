server:
  port: 8089

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/massage?useUnicode=true&characterEncoding=utf-8&useSSL=false
    username: root
    password: 123456
